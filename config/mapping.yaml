ads_connection:
  ams_net_id: "127.0.0.1.1.1"   # Replace with real PLC AMS Net ID on deploy
  port: 48898
  local_ams_net_id: ""           # Optional, local AMS Net ID
  route_ip: ""                   # Optional, PLC IP address (for route setup)
  timeout: 5000                  # ADS operation timeout in ms
  reconnect_enabled: true
  reconnect_interval: 1.0
  reconnect_max_interval: 30.0
  reconnect_backoff: 2.0
  fallback_to_route_ip: true   # 当 ams_net_id 不通时，使用 route_ip 直连

heartbeat:
  interval: 5
  max_failures: 3

modbus_slave:
  host: "0.0.0.0"
  port: 5020
  slave_id: 1
  max_connections: 10

sync_interval: 0.5

logging:
  log_dir: "/home/wu/logs/ecs/ads"
  log_file: "gateway.log"
  level: "INFO"
  max_bytes: 209715200        # 200MB
  max_days: 7
  max_total_bytes: 2147483648  # 2GB
  backup_count: 7
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

mappings:
  # --- Coils: Process.BoxReady signals ---
  - ads_var: "Proces.BoxReady_AM68"
    modbus_type: "coils"
    modbus_address: 1
    data_type: "bool"
    description: "BoxReady AM68"

  - ads_var: "Proces.BoxReady_AM68_cb"
    modbus_type: "coils"
    modbus_address: 2
    data_type: "bool"
    description: "BoxReady AM68 callback"

  - ads_var: "Proces.BoxReady_AM71"
    modbus_type: "coils"
    modbus_address: 3
    data_type: "bool"
    description: "BoxReady AM71"

  - ads_var: "Proces.BoxReady_AM71_cb"
    modbus_type: "coils"
    modbus_address: 4
    data_type: "bool"
    description: "BoxReady AM71 callback"

  - ads_var: "Proces.BoxReady_AM72"
    modbus_type: "coils"
    modbus_address: 5
    data_type: "bool"
    description: "BoxReady AM72"

  - ads_var: "Proces.BoxReady_AM72_cb"
    modbus_type: "coils"
    modbus_address: 6
    data_type: "bool"
    description: "BoxReady AM72 callback"

  - ads_var: "Proces.BoxReady_AM46"
    modbus_type: "coils"
    modbus_address: 7
    data_type: "bool"
    description: "BoxReady AM46"

  - ads_var: "Proces.BoxReady_AM46_cb"
    modbus_type: "coils"
    modbus_address: 8
    data_type: "bool"
    description: "BoxReady AM46 callback"

  - ads_var: "Proces.BoxReady_AM56"
    modbus_type: "coils"
    modbus_address: 9
    data_type: "bool"
    description: "BoxReady AM56"

  - ads_var: "Proces.BoxReady_AM56_cb"
    modbus_type: "coils"
    modbus_address: 10
    data_type: "bool"
    description: "BoxReady AM56 callback"

  - ads_var: "Proces.BoxReady_AM58"
    modbus_type: "coils"
    modbus_address: 11
    data_type: "bool"
    description: "BoxReady AM58"

  - ads_var: "Proces.BoxReady_AM58_cb"
    modbus_type: "coils"
    modbus_address: 12
    data_type: "bool"
    description: "BoxReady AM58 callback"

  - ads_var: "Proces.BoxReady_AM59"
    modbus_type: "coils"
    modbus_address: 13
    data_type: "bool"
    description: "BoxReady AM59"

  - ads_var: "Proces.BoxReady_AM59_cb"
    modbus_type: "coils"
    modbus_address: 14
    data_type: "bool"
    description: "BoxReady AM59 callback"

  - ads_var: "Proces.PG_Box_Ready_cb"
    modbus_type: "coils"
    modbus_address: 15
    data_type: "bool"
    description: "PG Box Ready callback"

  - ads_var: "Proces.PG_Full_Ready"
    modbus_type: "coils"
    modbus_address: 16
    data_type: "bool"
    description: "PG Full Ready"

  - ads_var: "Proces.PG_Full_Ready_cb"
    modbus_type: "coils"
    modbus_address: 17
    data_type: "bool"
    description: "PG Full Ready callback"

  - ads_var: "Proces.PG_Full_End_cb"
    modbus_type: "coils"
    modbus_address: 18
    data_type: "bool"
    description: "PG Full End callback"

  # --- Holding Registers: Robot variables ---
  - ads_var: "B.batteryLevel_R1"
    modbus_type: "holding_registers"
    modbus_address: 1
    data_type: "uint8"
    description: "Robot 1 battery level"

  - ads_var: "B.robWarningCode_R1"
    modbus_type: "holding_registers"
    modbus_address: 2
    data_type: "uint16"
    description: "Robot 1 warning code"

  - ads_var: "C.batteryLevel_R2"
    modbus_type: "holding_registers"
    modbus_address: 3
    data_type: "uint8"
    description: "Robot 2 battery level"

  - ads_var: "C.robWarningCode_R2"
    modbus_type: "holding_registers"
    modbus_address: 4
    data_type: "uint16"
    description: "Robot 2 warning code"
